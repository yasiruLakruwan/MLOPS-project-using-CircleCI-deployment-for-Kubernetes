apiVersion: apps/v1

kind: Deployment
metadata:
  name: mlops-app 
spec: 
  replicas: 2
  selector:
    matchLabels: 
      app: mlops-app
  templates:
    metadata:
      lables: 
        app: mlops-app
    spec:
      containers:
      - name: mlops-app
        image: us-central1-docker.pkg.dev/gitlab-deployment-494512/mlops-app:latest
        ports:
        - containerPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: mlops-service 
spec: 
  selector:
    app: mlops-app
  ports:
    - protocol: TCP
      port: 80
      trargetPort: 5000
  type: LoadBalancer
  